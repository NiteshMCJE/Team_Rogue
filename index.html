<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>TEAM ROGUE · Elite Minecraft Team</title>
  <!-- SEO Meta -->
  <meta name="description" content="TEAM ROGUE – Elite Minecraft Team. Modern esports collective." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <!-- Font & Icons (minimal) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ----- GLOBAL RESET & VARIABLES (edit colors here) ----- */
    :root {
      --bg-primary: #09090B;
      --bg-secondary: #111827;
      --electric-blue: #00BFFF;
      --cyan-glow: #00E5FF;
      --purple-accent: #7C3AED;
      --text-white: #f1f5f9;
      --glass-bg: rgba(17, 24, 39, 0.55);
      --glass-border: rgba(255, 255, 255, 0.08);
      --shadow-glow: 0 8px 32px rgba(0, 191, 255, 0.15);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --nav-height: 70px;
      --radius-card: 24px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-white);
      font-family: var(--font);
      overflow-x: hidden;
      cursor: default;
      line-height: 1.6;
    }
    /* custom scroll */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0b0b12; }
    ::-webkit-scrollbar-thumb { background: var(--electric-blue); border-radius: 12px; }
    ::selection { background: var(--electric-blue); color: #09090B; }

    /* ----- BACKGROUND LAYERS (animated aurora + particles) ----- */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .aurora {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.5;
      animation: auroraDrift 18s infinite alternate ease-in-out;
    }
    .aurora:nth-child(1) { width: 600px; height: 600px; background: #0044ff30; top: -10%; left: -10%; }
    .aurora:nth-child(2) { width: 500px; height: 500px; background: #7C3AED40; bottom: -10%; right: -5%; animation-duration: 22s; }
    .aurora:nth-child(3) { width: 700px; height: 400px; background: #00BFFF20; top: 40%; left: 30%; animation-duration: 26s; filter: blur(140px); }
    @keyframes auroraDrift {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { transform: translate(60px, -40px) scale(1.2) rotate(8deg); }
    }
    /* particles canvas */
    #particles-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    /* mouse glow */
    #mouse-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0,191,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 2;
      transition: opacity 0.3s;
      will-change: transform, left, top;
    }

    /* ----- LOADING SCREEN ----- */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loading-logo {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--electric-blue), var(--purple-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulseGlow 1.8s infinite;
    }
    .loading-bar {
      width: 200px;
      height: 4px;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
      margin: 0.5rem 0;
    }
    .loading-progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--electric-blue), var(--cyan-glow));
      border-radius: 8px;
      animation: loadProgress 2.2s ease forwards;
    }
    @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
    @keyframes pulseGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.7; text-shadow: 0 0 30px #00BFFF40; } }
    .loading-sub {
      font-size: 0.9rem;
      color: #94a3b8;
      letter-spacing: 2px;
      font-weight: 300;
    }

    /* ----- LOGIN PAGE (glass) ----- */
    #login-page {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(9, 9, 11, 0.7);
      backdrop-filter: blur(6px);
      transition: opacity 0.5s, transform 0.5s;
    }
    #login-page.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
    }
    .login-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 2.8rem 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-glow), 0 20px 60px rgba(0,0,0,0.6);
      text-align: center;
      transition: 0.3s;
    }
    .login-card h2 {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 0.3rem;
    }
    .login-card h2 span { color: var(--electric-blue); }
    .login-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
    .login-input-wrap {
      position: relative;
      margin: 1.2rem 0;
    }
    .login-input-wrap input {
      width: 100%;
      padding: 16px 20px;
      background: #0f172a80;
      border: 1px solid #1e293b;
      border-radius: 60px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
      padding-right: 50px;
    }
    .login-input-wrap input:focus { border-color: var(--electric-blue); box-shadow: 0 0 20px #00BFFF30; }
    .toggle-pw {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, var(--electric-blue), var(--purple-accent));
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 4px 20px #00BFFF40;
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }
    .login-btn:hover { transform: scale(1.02); box-shadow: 0 6px 30px #00BFFF70; }
    .login-error {
      color: #f87171;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      min-height: 1.8rem;
    }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{ transform: translateX(0); } 25%{ transform: translateX(-8px); } 75%{ transform: translateX(8px); } }

    /* ----- MAIN WEBSITE (hidden until login) ----- */
    #main-site {
      opacity: 0;
      transition: opacity 0.8s ease;
      position: relative;
      z-index: 10;
    }
    #main-site.visible { opacity: 1; }

    /* ----- NAVBAR ----- */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-height);
      background: rgba(9, 9, 11, 0.75);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      transition: 0.2s;
    }
    .nav-logo {
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff, var(--electric-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
      font-weight: 500;
    }
    .nav-links a {
      color: #cbd5e1;
      text-decoration: none;
      font-size: 0.95rem;
      transition: 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0%;
      height: 2px;
      background: var(--electric-blue);
      transition: 0.3s;
    }
    .nav-links a:hover, .nav-links a.active { color: white; }
    .nav-links a.active::after { width: 100%; }
    .nav-logout {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-logout:hover { border-color: var(--electric-blue); color: white; }
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
    }

    /* ----- SECTIONS (common) ----- */
    section {
      padding: 5rem 2.5rem;
      max-width: 1280px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }
    .section-title {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, var(--electric-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-glow);
      transition: 0.3s;
    }

    /* HERO */
    #hero {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 1.2rem;
      padding-top: 2rem;
    }
    #hero h1 {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: 6px;
      text-shadow: 0 0 60px #00BFFF30;
    }
    #hero h1 span { color: var(--electric-blue); }
    .hero-sub {
      font-size: 1.4rem;
      color: #94a3b8;
      font-weight: 300;
    }
    .hero-cta {
      margin-top: 1.5rem;
      padding: 14px 48px;
      border-radius: 60px;
      background: linear-gradient(135deg, var(--electric-blue), var(--purple-accent));
      border: none;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 0 40px #00BFFF40;
      cursor: pointer;
      transition: 0.3s;
    }
    .hero-cta:hover { transform: scale(1.03); box-shadow: 0 0 70px #00BFFF70; }

    /* MEMBERS */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }
    .member-card {
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 1.8rem 1rem 1.8rem;
      text-align: center;
      transition: 0.3s;
      transform-style: preserve-3d;
      perspective: 800px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .member-card:hover { transform: translateY(-6px) scale(1.02); border-color: var(--electric-blue); box-shadow: 0 12px 40px #00BFFF20; }
    .member-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: contain;
      background: #0f172a;
      padding: 6px;
      border: 2px solid #1e293b;
      transition: 0.3s;
    }
    .member-card:hover img { border-color: var(--electric-blue); }
    .member-name { font-weight: 700; font-size: 1.2rem; margin: 0.8rem 0 0.2rem; }
    .member-role { color: var(--electric-blue); font-weight: 500; font-size: 0.85rem; letter-spacing: 1px; }
    .member-desc { color: #94a3b8; font-size: 0.8rem; margin-top: 0.4rem; }

    /* GALLERY */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
      gap: 1.5rem;
    }
    .gallery-item {
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
      background: #0f172a;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #1e293b;
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.3s;
    }
    .gallery-item:hover img { transform: scale(1.08); }
    .gallery-item:hover { border-color: var(--electric-blue); }

    /* DOWNLOADS */
    .downloads-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 2rem;
    }
    .download-card {
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 2rem 1.5rem;
      border: 1px solid var(--glass-border);
      text-align: center;
      transition: 0.3s;
    }
    .download-card:hover { border-color: var(--electric-blue); transform: translateY(-4px); }
    .download-card i { font-size: 2.8rem; color: var(--electric-blue); margin-bottom: 0.8rem; }
    .download-card h4 { font-weight: 600; margin-bottom: 0.3rem; }
    .download-card p { color: #94a3b8; font-size: 0.85rem; }
    .download-btn {
      margin-top: 1rem;
      background: transparent;
      border: 1px solid var(--electric-blue);
      color: white;
      padding: 6px 28px;
      border-radius: 40px;
      transition: 0.25s;
      cursor: pointer;
    }
    .download-btn:hover { background: var(--electric-blue); color: #09090B; }

    /* CONTACT */
    .social-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 2rem 0;
    }
    .social-links a {
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      padding: 1rem 2rem;
      border-radius: 60px;
      border: 1px solid var(--glass-border);
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .social-links a:hover { border-color: var(--electric-blue); box-shadow: 0 0 30px #00BFFF30; transform: scale(1.03); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 3rem 1.5rem 2rem;
      color: #475569;
      border-top: 1px solid #1e293b30;
      font-weight: 300;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }
    footer span { color: var(--electric-blue); text-shadow: 0 0 20px #00BFFF30; }

    /* scroll to top */
    #scroll-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--electric-blue);
      color: #09090B;
      border: none;
      border-radius: 40px;
      padding: 12px 16px;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0;
      transition: 0.3s;
      z-index: 99;
      box-shadow: 0 0 30px #00BFFF60;
    }
    #scroll-top.show { opacity: 1; }

    /* responsive */
    @media (max-width: 820px) {
      .nav-links { display: none; flex-direction: column; background: #0b0b14; position: absolute; top: var(--nav-height); left: 0; width: 100%; padding: 1.5rem; gap: 1.2rem; backdrop-filter: blur(20px); border-bottom: 1px solid #1e293b; }
      .nav-links.open { display: flex; }
      .menu-toggle { display: block; }
      nav { padding: 0 1.2rem; }
      section { padding: 3rem 1.2rem; }
      #hero h1 { font-size: 3.2rem; }
    }
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.2rem; }
    }
  </style>
</head>
<body>
  <!-- BACKGROUND LAYERS -->
  <div id="bg-layer">
    <div class="aurora"></div>
    <div class="aurora"></div>
    <div class="aurora"></div>
  </div>
  <canvas id="particles-canvas"></canvas>
  <div id="mouse-glow"></div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loading-logo">TEAM ROGUE</div>
    <div class="loading-bar"><div class="loading-progress"></div></div>
    <div class="loading-sub">loading experience</div>
  </div>

  <!-- LOGIN PAGE -->
  <div id="login-page">
    <div class="login-card glass-card">
      <h2><span>⚡</span> TEAM ROGUE</h2>
      <p>enter passkey to enter</p>
      <div class="login-input-wrap">
        <input type="password" id="password-input" placeholder="Password" />
        <button class="toggle-pw" id="toggle-pw"><i class="fas fa-eye"></i></button>
      </div>
      <button class="login-btn" id="login-btn">UNLOCK <i class="fas fa-arrow-right"></i></button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <!-- MAIN SITE -->
  <div id="main-site">
    <!-- NAV -->
    <nav>
      <div class="nav-logo">TEAM ROGUE</div>
      <ul class="nav-links" id="nav-links">
        <li><a href="#hero" class="active">Home</a></li>
        <li><a href="#members">Members</a></li>
        <li><a href="#gallery">Gallery</a></li>
        <li><a href="#downloads">Downloads</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <div style="display: flex; gap: 1rem; align-items:center;">
        <button class="nav-logout" id="logout-btn">LOGOUT</button>
        <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
      </div>
    </nav>

    <!-- HERO -->
    <section id="hero">
      <h1>TEAM <span>ROGUE</span></h1>
      <div class="hero-sub" id="typing-sub">Elite Minecraft Team</div>
      <button class="hero-cta" onclick="document.getElementById('members').scrollIntoView()">ENTER <i class="fas fa-arrow-right"></i></button>
    </section>

    <!-- MEMBERS -->
    <section id="members">
      <h2 class="section-title">⚡ members</h2>
      <div class="members-grid" id="members-container"></div>
    </section>

    <!-- GALLERY -->
    <section id="gallery">
      <h2 class="section-title">🖼️ gallery</h2>
      <div class="gallery-grid" id="gallery-container"></div>
    </section>

    <!-- DOWNLOADS -->
    <section id="downloads">
      <h2 class="section-title">⬇️ downloads</h2>
      <div class="downloads-grid" id="downloads-container"></div>
    </section>

    <!-- CONTACT -->
    <section id="contact">
      <h2 class="section-title">📬 contact</h2>
      <div class="social-links">
        <a href="#"><i class="fab fa-discord"></i> Discord</a>
        <a href="#"><i class="fab fa-github"></i> GitHub</a>
        <a href="#"><i class="fab fa-youtube"></i> YouTube</a>
      </div>
    </section>

    <footer>MADE BY <span>NITESH</span> · TEAM ROGUE</footer>
    <button id="scroll-top"><i class="fas fa-arrow-up"></i></button>
  </div>

  <script>
    // ========== CONFIG (easy edit) ==========
    const CONFIG = {
      PASSWORD: "since_2024",
      TEAM_NAME: "TEAM ROGUE",
      SUBTITLE: "Elite Minecraft Team",
      MEMBERS: [
        { name: "ItzMagmo_OG", role: "Leader", desc: "Master tactician.", img: "assets/members/magmo.png" },
        { name: "Not_Nitesh", role: "Strategist", desc: "Code & control.", img: "assets/members/nitesh.png" },
        { name: "TPlayGamer", role: "Fragger", desc: "Aggressive genius.", img: "assets/members/tplay.png" },
        { name: "Zorzo_Gaming", role: "Support", desc: "Always clutch.", img: "assets/members/zorzo.png" }
      ],
      DOWNLOADS: [
        { icon: "fa-solid fa-cube", title: "Resource Pack", desc: "HD textures 128x", link: "#" },
        { icon: "fa-solid fa-headset", title: "Team Voice", desc: "Discord overlay", link: "#" },
        { icon: "fa-solid fa-map", title: "Map Pack", desc: "Competitive maps", link: "#" }
      ]
    };

    // ========== LOADING ==========
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 2400);
    });

    // ========== PARTICLES ==========
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];
    function resizeCanvas() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.size = Math.random() * 2.2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.opacity = Math.random() * 0.5 + 0.1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > w) this.speedX *= -1;
        if (this.y < 0 || this.y > h) this.speedY *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 191, 255, ${this.opacity})`;
        ctx.fill();
      }
    }
    for (let i = 0; i < 120; i++) particles.push(new Particle());
    function animateParticles() {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ========== MOUSE GLOW ==========
    const glow = document.getElementById('mouse-glow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });

    // ========== LOGIN ==========
    const loginPage = document.getElementById('login-page');
    const mainSite = document.getElementById('main-site');
    const pwInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const loginError = document.getElementById('login-error');
    const togglePw = document.getElementById('toggle-pw');

    // localstorage check
    if (localStorage.getItem('teamrogue_logged') === 'true') {
      loginPage.classList.add('hidden');
      mainSite.classList.add('visible');
    }

    function attemptLogin() {
      const val = pwInput.value.trim();
      if (val === CONFIG.PASSWORD) {
        loginError.textContent = '';
        loginPage.classList.add('hidden');
        mainSite.classList.add('visible');
        localStorage.setItem('teamrogue_logged', 'true');
      } else {
        loginError.textContent = '⛔ wrong passkey';
        loginPage.querySelector('.login-card').classList.add('shake');
        setTimeout(() => loginPage.querySelector('.login-card').classList.remove('shake'), 500);
        pwInput.value = '';
        pwInput.focus();
      }
    }

    loginBtn.addEventListener('click', attemptLogin);
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
    togglePw.addEventListener('click', () => {
      const type = pwInput.type === 'password' ? 'text' : 'password';
      pwInput.type = type;
      togglePw.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });

    // ========== LOGOUT ==========
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('teamrogue_logged');
      location.reload();
    });

    // ========== NAV ==========
    const navLinks = document.querySelectorAll('.nav-links a');
    const sections = document.querySelectorAll('section');
    window.addEventListener('scroll', () => {
      let current = 'hero';
      sections.forEach(sec => {
        const top = sec.offsetTop - 150;
        if (window.scrollY >= top) current = sec.id;
      });
      navLinks.forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + current);
      });
    });
    document.getElementById('menu-toggle').addEventListener('click', () => {
      document.getElementById('nav-links').classList.toggle('open');
    });
    // close on link click mobile
    document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', () => {
      document.getElementById('nav-links').classList.remove('open');
    }));

    // ========== SCROLL TOP ==========
    const scrollBtn = document.getElementById('scroll-top');
    window.addEventListener('scroll', () => {
      scrollBtn.classList.toggle('show', window.scrollY > 600);
    });
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ========== TYPING ==========
    const subEl = document.getElementById('typing-sub');
    const text = CONFIG.SUBTITLE;
    let idx = 0;
    function typeEffect() {
      if (idx < text.length) {
        subEl.textContent += text.charAt(idx);
        idx++;
        setTimeout(typeEffect, 120);
      }
    }
    setTimeout(typeEffect, 800);

    // ========== MEMBERS ==========
    const membersContainer = document.getElementById('members-container');
    CONFIG.MEMBERS.forEach(m => {
      const card = document.createElement('div');
      card.className = 'member-card';
      card.innerHTML = `
        <img src="${m.img}" alt="${m.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23111827%22/%3E%3Ctext x=%2230%22 y=%2260%22 fill=%22%236b7b8d%22 font-size=%2240%22%3E?%3C/text%3E%3C/svg%3E'" />
        <div class="member-name">${m.name}</div>
        <div class="member-role">${m.role}</div>
        <div class="member-desc">${m.desc}</div>
      `;
      membersContainer.appendChild(card);
    });

    // ========== GALLERY (auto-load from assets/gallery/) ==========
    const galleryContainer = document.getElementById('gallery-container');
    // attempt to load images from assets/gallery/ (if any)
    const galleryImages = [
      'assets/gallery/screenshot1.png',
      'assets/gallery/screenshot2.png',
      'assets/gallery/screenshot3.png',
      'assets/gallery/screenshot4.png',
      'assets/gallery/screenshot5.png',
      'assets/gallery/screenshot6.png'
    ];
    let loaded = 0;
    galleryImages.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = 'screenshot';
      img.onerror = () => { img.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect width=%22200%22 height=%22200%22 fill=%22%23111827%22/%3E%3Ctext x=%2250%22 y=%22110%22 fill=%22%234a5a6e%22 font-size=%2220%22%3E📷%3C/text%3E%3C/svg%3E'; };
      img.onload = () => { loaded++; };
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.appendChild(img);
      galleryContainer.appendChild(div);
    });
    // lightbox (simple)
    document.addEventListener('click', (e) => {
      const item = e.target.closest('.gallery-item');
      if (!item) return;
      const img = item.querySelector('img');
      if (!img) return;
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:#09090be0;z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);cursor:pointer;';
      const big = document.createElement('img');
      big.src = img.src;
      big.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:24px;box-shadow:0 0 60px #00BFFF40;';
      overlay.appendChild(big);
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
    });

    // ========== DOWNLOADS ==========
    const downloadsContainer = document.getElementById('downloads-container');
    CONFIG.DOWNLOADS.forEach(d => {
      const card = document.createElement('div');
      card.className = 'download-card';
      card.innerHTML = `
        <i class="${d.icon}"></i>
        <h4>${d.title}</h4>
        <p>${d.desc}</p>
        <button class="download-btn" onclick="alert('download ${d.title}')"><i class="fas fa-download"></i> Download</button>
      `;
      downloadsContainer.appendChild(card);
    });

    // ========== EXTRA: copy discord (optional) ==========
    console.log('TEAM ROGUE · ready');
  </script>
</body>
</html>
